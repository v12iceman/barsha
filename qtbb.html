<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Barsha ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

/* Canvas */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* Center Text (UPDATED) */
#text {
    position: absolute;
    width: 100%;
    top: 40%;
    font-size: 4em;
    opacity: 0;
    transition: opacity 0.8s ease;
    z-index: 2;

    color: #ff4d6d;
    text-shadow: 0 0 10px #ff4d6d,
                 0 0 20px #ff1a4d,
                 0 0 40px #ff1a4d;
}

/* Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* Floating Hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0.8;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}

/* Book Button */
#openBookBtn {
    position: absolute;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    font-size: 1.2em;
    background: #ff4d6d;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: none;
    z-index: 3;
}

/* Book */
#book {
    position: fixed;
    width: 300px;
    height: 400px;
    background: #fff;
    color: black;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
    transition: transform 0.5s ease;
    z-index: 5;
}

#book.open {
    transform: translate(-50%, -50%) scale(1);
}

#book h2 {
    margin-top: 0;
}

#closeBook {
    position: absolute;
    top: 10px;
    right: 10px;
    cursor: pointer;
    font-size: 1.2em;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<div id="text"></div>

<button id="openBookBtn">Open Message 💌</button>

<div id="book">
    <div id="closeBook">❌</div>
    <h2>❤️</h2>
    <p>
        chasmiss cutiepie! 🎂🎉<br><br>
        birthday ta aako chaina tei pani draftt haiiii
        💖
    </p>
</div>

<script>
// ================= MATRIX =================
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const words = ["BB", "❤️"];
const fontSize = 10;
const columns = canvas.width / fontSize;

const drops = [];
for (let i = 0; i < columns; i++) {
    drops[i] = Math.random() * canvas.height;
}

let matrixRunning = true;

function drawMatrix() {
    if (!matrixRunning) return;

    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff4d6d";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        let text = words[Math.floor(Math.random() * words.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(drawMatrix, 50);

// ================= STARS =================
function createStars() {
    for (let i = 0; i < 120; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * 100 + "vh";
        star.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(star);
    }
}

// ================= HEARTS =================
function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (15 + Math.random() * 20) + "px";
        heart.style.animationDuration = (3 + Math.random() * 3) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }, 300);
}

// ================= TEXT =================
const textEl = document.getElementById("text");

function showText(content, duration) {
    return new Promise(resolve => {
        textEl.innerHTML = content;
        textEl.style.opacity = 1;

        setTimeout(() => {
            textEl.style.opacity = 0;
            setTimeout(resolve, 800);
        }, duration);
    });
}

// ================= SEQUENCE =================
async function startSequence() {
    await showText("3", 1000);
    await showText("2", 1000);
    await showText("1", 1000);

    matrixRunning = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    createStars();
    createHearts();

    await showText("HAPPY", 1000);
    await showText("EARLY BIRTHDAY", 2000);
    await showText("TO", 1000);
    await showText("QT", 2000);
    await showText("BARSHAA ❤️", 4000);

    document.getElementById("openBookBtn").style.display = "block";
}

startSequence();

// ================= BOOK =================
const book = document.getElementById("book");
const btn = document.getElementById("openBookBtn");
const close = document.getElementById("closeBook");

btn.onclick = () => book.classList.add("open");
close.onclick = () => book.classList.remove("open");

// ================= RESPONSIVE =================
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
